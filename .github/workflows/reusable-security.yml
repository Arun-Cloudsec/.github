# .github/workflows/reusable-security.yml
#
# AgentOS — Reusable security pipeline.
#
# This workflow is intended to live in `Arun-Cloudsec/.github` and be called
# by per-agent wrapper workflows in every agent repo. One canonical version,
# many consumers. To upgrade scanners, action SHAs, or skip rules, change
# this file once — every agent repo inherits the change on its next run.
#
# Consumer wrapper (in `Arun-Cloudsec/<agent-repo>/.github/workflows/security.yml`):
#
#   name: Security CI
#   on:
#     pull_request: { branches: [main] }
#     push:         { branches: [main] }
#     schedule:     [{ cron: '0 2 * * *' }]
#     workflow_dispatch:
#   permissions:
#     contents: read
#     security-events: write
#     actions: read
#   jobs:
#     security:
#       uses: Arun-Cloudsec/.github/.github/workflows/reusable-security.yml@main
#       with:
#         language: javascript      # or python, go — controls which scanners run
#         scan-container: true      # set false for repos without a Dockerfile
#       secrets: inherit
#
# Note the path: GitHub requires the format `<owner>/<repo>/.github/workflows/<file>@<ref>`.
# The `.github/workflows/` is literal — yes, doubled — because the repo IS named
# `.github` and the workflow lives at `.github/workflows/` inside it.

name: Reusable Security CI

on:
  workflow_call:
    inputs:
      language:
        description: 'Primary language: javascript, python, go, or none (skip code analysis)'
        type: string
        default: 'javascript'
      scan-container:
        description: 'Whether to build and scan a container image (requires Dockerfile)'
        type: boolean
        default: true
      scan-iac:
        description: 'Whether to scan IaC files (CloudFormation, Bicep, Terraform)'
        type: boolean
        default: false
      iac-files:
        description: 'Comma-separated list of IaC files to scan (CloudFormation only for now)'
        type: string
        default: ''
      severity-threshold:
        description: 'Fail on this severity or higher (CRITICAL, HIGH, MEDIUM)'
        type: string
        default: 'HIGH'

permissions:
  contents: read

concurrency:
  group: reusable-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # 1. Secrets scanning — Gitleaks
  # ──────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  # ──────────────────────────────────────────────────────────────────────────
  # 2. Dependency audit — language-aware
  # JavaScript: npm audit + Trivy fs
  # Python:     pip-audit + Trivy fs
  # Go:         govulncheck + Trivy fs
  # none:       Trivy fs only
  # ──────────────────────────────────────────────────────────────────────────
  dependency-audit:
    name: Dependencies — ${{ inputs.language }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      # JavaScript path
      - name: Setup Node
        if: inputs.language == 'javascript'
        uses: actions/setup-node@1e60f620b9541d16bece96c5465dc8ee9832be0b  # v4.0.3
        with:
          node-version: '20'
          cache: 'npm'
      - name: npm audit
        if: inputs.language == 'javascript'
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
            # Map our threshold to npm audit levels
            case "${{ inputs.severity-threshold }}" in
              CRITICAL) LEVEL=critical ;;
              HIGH)     LEVEL=high ;;
              *)        LEVEL=moderate ;;
            esac
            npm audit --audit-level="$LEVEL"
          else
            echo "::warning::No package-lock.json found — skipping npm audit"
          fi

      # Python path
      - name: Setup Python
        if: inputs.language == 'python'
        uses: actions/setup-python@39cd14951b08e74b54015e9e001cdefcf80e669f  # v5.1.1
        with:
          python-version: '3.12'
      - name: pip-audit
        if: inputs.language == 'python'
        run: |
          set -euo pipefail
          pip install --quiet pip-audit
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt --strict
          elif [ -f pyproject.toml ]; then
            pip-audit --strict
          else
            echo "::warning::No requirements.txt or pyproject.toml — skipping pip-audit"
          fi

      # Go path
      - name: Setup Go
        if: inputs.language == 'go'
        uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32  # v5.0.2
        with:
          go-version: '1.22'
      - name: govulncheck
        if: inputs.language == 'go'
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      # All languages: Trivy filesystem scan.
      # Two layers of robustness here:
      #   (a) Pre-create an empty SARIF file so the always-run upload step
      #       never errors with "Path does not exist" if Trivy crashes.
      #   (b) Trivy DB downloads via GHCR (avoids Docker Hub rate limits)
      #       with a retry loop — first-run DB pulls flake regularly.
      - name: Trivy filesystem scan
        id: trivy-fs
        continue-on-error: true        # let the upload step run even if Trivy fails
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.24.0
        with:
          scan-type: fs
          scan-ref: '.'
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
          # Retry DB downloads up to 3 times before giving up
          TRIVY_DOWNLOAD_DB_RETRY: '3'
      - name: Ensure SARIF exists (write empty if Trivy failed)
        if: always()
        run: |
          if [ ! -f trivy-fs.sarif ]; then
            echo "::warning::Trivy fs scan didn't produce SARIF — writing empty placeholder"
            # Valid SARIF for Code Scanning: must have at least one run with tool driver
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"trivy-placeholder"}},"results":[]}]}' > trivy-fs.sarif
          fi
      - name: Fail step if Trivy actually had findings or crashed
        if: steps.trivy-fs.outcome == 'failure'
        run: |
          # Distinguish "Trivy crashed (CI flake)" from "Trivy found vulns (real)"
          if [ -s trivy-fs.sarif ] && jq -e '.runs[0].results | length > 0' trivy-fs.sarif >/dev/null 2>&1; then
            echo "::error::Trivy found High/Critical vulnerabilities — see SARIF in Security tab"
            exit 1
          else
            echo "::warning::Trivy fs scan failed for infrastructure reasons (likely DB pull). Will retry on next run."
            # Don't fail the gate on a CI flake
            exit 0
          fi

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  # ──────────────────────────────────────────────────────────────────────────
  # 3. Container image scan — only if scan-container is true
  # ──────────────────────────────────────────────────────────────────────────
  container-scan:
    name: Container — Trivy image
    if: inputs.scan-container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7

      - name: Check for Dockerfile
        run: |
          if [ ! -f Dockerfile ]; then
            echo "::error::scan-container=true but no Dockerfile found in repo root"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db  # v3.6.1

      - name: Build image (no push)
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85  # v6.7.0
        with:
          context: .
          push: false
          tags: agentos-scan:latest
          load: true
          provenance: false

      - name: Trivy image scan
        id: trivy-image
        continue-on-error: true
        uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8  # v0.24.0
        with:
          image-ref: agentos-scan:latest
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
        env:
          TRIVY_DB_REPOSITORY: ghcr.io/aquasecurity/trivy-db
          TRIVY_DOWNLOAD_DB_RETRY: '3'
      - name: Ensure SARIF exists (write empty if Trivy failed)
        if: always()
        run: |
          if [ ! -f trivy-image.sarif ]; then
            echo "::warning::Trivy image scan didn't produce SARIF — writing empty placeholder"
            echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"trivy-placeholder"}},"results":[]}]}' > trivy-image.sarif
          fi
      - name: Fail step if Trivy actually had findings or crashed
        if: steps.trivy-image.outcome == 'failure'
        run: |
          if [ -s trivy-image.sarif ] && jq -e '.runs[0].results | length > 0' trivy-image.sarif >/dev/null 2>&1; then
            echo "::error::Trivy found High/Critical vulnerabilities in the image — see SARIF in Security tab"
            exit 1
          else
            echo "::warning::Trivy image scan failed for infrastructure reasons (likely DB pull). Will retry on next run."
            exit 0
          fi

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ──────────────────────────────────────────────────────────────────────────
  # 4. CodeQL — language-aware
  # Two jobs: one for the source language (JS/Python/Go), one for Actions.
  # Splitting them avoids the matrix-level "Did not recognize language: actions"
  # parsing quirk that surfaces when actions is mixed with source languages.
  # ──────────────────────────────────────────────────────────────────────────
  code-analysis-source:
    name: Code — CodeQL (${{ inputs.language }})
    if: inputs.language != 'none'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Initialize CodeQL
        uses: github/codeql-action/init@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          languages: ${{ inputs.language == 'javascript' && 'javascript-typescript' || inputs.language }}
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          category: '/language:${{ inputs.language }}'

  code-analysis-actions:
    name: Code — CodeQL (actions)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Initialize CodeQL (actions)
        uses: github/codeql-action/init@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          languages: actions
          # build-mode is required for the actions extractor in newer CodeQL
          build-mode: none
          queries: security-and-quality
      - name: Perform CodeQL analysis (actions)
        uses: github/codeql-action/analyze@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          category: '/language:actions'

  # ──────────────────────────────────────────────────────────────────────────
  # 5. IaC scan — only if scan-iac is true
  # ──────────────────────────────────────────────────────────────────────────
  iac-scan:
    name: IaC — Checkov
    if: inputs.scan-iac && inputs.iac-files != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - name: Run Checkov
        uses: bridgecrewio/checkov-action@99bb2caf247dfd9f03cf984373bc6043d4e32ebf  # v12.1347.0
        with:
          file: ${{ inputs.iac-files }}
          framework: cloudformation
          output_format: sarif
          output_file_path: checkov.sarif
          skip_check: 'CKV_AWS_8,CKV_AWS_157,CKV_AWS_117'
          soft_fail: false
      - name: Upload Checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@f779452ac5af1c261dce0346a8f964149f49322b  # v3.27.0
        with:
          sarif_file: checkov.sarif/results_sarif.sarif
          category: checkov

  # ──────────────────────────────────────────────────────────────────────────
  # 6. Actions audit — zizmor
  # Uses the official zizmor-action which handles install, run, SARIF emission,
  # and upload to Code Scanning in one step. Much more reliable than my
  # previous pipx install + manual SARIF wrangling.
  # See: https://docs.zizmor.sh/integrations/
  # ──────────────────────────────────────────────────────────────────────────
  actions-audit:
    name: Actions — zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read           # zizmor-action needs this on private repos
    steps:
      - name: Checkout repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b1d7e1fb5de872772f31590499237e7cce841e8e  # v0.5.3
        with:
          # advanced-security: true is the default and uploads SARIF to Code
          # Scanning — works on public repos and private repos with GHAS.
          # If neither applies, set advanced-security: false here.
          advanced-security: true

  # ──────────────────────────────────────────────────────────────────────────
  # 7. SBOM
  # ──────────────────────────────────────────────────────────────────────────
  sbom:
    name: SBOM — Syft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332  # v4.1.7
      - uses: anchore/sbom-action@e8d2a6937ecead383dfe75190d104edd1f9c5751  # v0.16.1
        with:
          path: '.'
          format: spdx-json
          artifact-name: ${{ github.event.repository.name }}-sbom.spdx.json
          output-file: sbom.spdx.json
      - uses: anchore/sbom-action@e8d2a6937ecead383dfe75190d104edd1f9c5751  # v0.16.1
        with:
          path: '.'
          format: cyclonedx-json
          artifact-name: ${{ github.event.repository.name }}-sbom.cdx.json
          output-file: sbom.cdx.json

  # ──────────────────────────────────────────────────────────────────────────
  # Gate — single status check for branch protection
  # ──────────────────────────────────────────────────────────────────────────
  security-gate:
    name: Security gate
    runs-on: ubuntu-latest
    needs:
      - secrets-scan
      - dependency-audit
      - container-scan
      - code-analysis-source
      - code-analysis-actions
      - iac-scan
      - actions-audit
      - sbom
    if: always()
    steps:
      - name: Verify all required jobs passed
        env:
          RESULTS: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          echo "$RESULTS" | jq -r 'to_entries | .[] | "\(.key): \(.value.result)"'
          FAILED=$(echo "$RESULTS" | jq -r 'to_entries | .[] | select(.value.result == "failure" or .value.result == "cancelled") | .key')
          if [ -n "$FAILED" ]; then
            echo "::error::Security gate failed. Failed jobs:"
            echo "$FAILED"
            exit 1
          fi
          echo "All security scans passed."
